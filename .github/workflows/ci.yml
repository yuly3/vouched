name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # 2026-03-28
        with:
          toolchain: "1.86.0"
          components: clippy,rustfmt
      - name: Format
        run: cargo fmt --all -- --check
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check --hide-inclusion-graph
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Clippy no default features
        run: cargo clippy --workspace --no-default-features -- -D warnings
      - name: Clippy alloc feature
        run: cargo clippy --workspace --no-default-features --features vouched/alloc,vouched-core/alloc -- -D warnings
      - name: Clippy valuable feature
        run: cargo clippy --workspace --no-default-features --features vouched/valuable,vouched-core/valuable -- -D warnings
      - name: Check all features
        run: cargo check --workspace --all-targets --all-features
      - name: Check no default features
        run: cargo check --workspace --no-default-features
      - name: Check alloc feature
        run: cargo check --workspace --no-default-features --features vouched/alloc,vouched-core/alloc
      - name: Check valuable feature
        run: cargo check --workspace --no-default-features --features vouched/valuable,vouched-core/valuable
      - name: Test default features
        run: cargo test --workspace
      - name: Test all features
        run: cargo test --workspace --all-features
      - name: Test valuable feature
        run: cargo test -p vouched --features valuable
      - name: Test examples
        run: |
          cargo run -p vouched --example string_constraints
          cargo run -p vouched --example numeric_range_and_cast
          cargo run -p vouched --example error
      - name: Test rustdoc examples
        run: cargo test --doc --workspace --all-features
      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
      - name: Build docs with warnings denied
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps

  release-dry-run:
    name: Release dry run
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # 2026-03-28
        with:
          toolchain: "1.86.0"
      - name: Package contents
        run: |
          cargo package -p vouched-core --list
          cargo package -p vouched-derive --list
          cargo package -p vouched --list
      - name: Publish dry run
        run: |
          cargo publish --dry-run -p vouched-core
          cargo publish --dry-run -p vouched-derive
          cargo publish --dry-run -p vouched
